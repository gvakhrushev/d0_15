name: D0 guards

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  guards:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history + tags so check_firewall can diff base-v14

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: validate canonical registry
        run: python tools/validate_csv.py

      - name: anti-promotion firewall (vs base-v14)
        run: python tools/check_firewall.py --base base-v14

      - name: no sorry/axiom in core+bridge+all
        run: python 09_LEAN_FORMALIZATION/tools/check_no_sorry_in_core.py

      - name: claim<->lean coverage
        run: python 09_LEAN_FORMALIZATION/tools/check_claim_map_coverage.py

      - name: physical bridge discipline
        run: python tools/check_physical_bridge_discipline.py

      - name: prose<->registry cert references
        run: python tools/check_book_cert_references.py

      - name: graph idempotence (generated artifacts up to date)
        shell: pwsh
        run: ./tools/regen_graph.ps1 -CheckOnly

      - name: scoreboard integrity (strict)
        run: python tools/d0_score.py --strict

# Note: Lean `lake build` is deferred (see 09_LEAN_FORMALIZATION/docs/
# LEAN_DEFERRED_RUN_POLICY.md); it runs only in a manual/release workflow.
